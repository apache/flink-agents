agents:
  - name: yaml_cross_language_agent
    description: |
      YAML-driven cross-language e2e agent.

      - math path: Python Ollama chat model calling a Java function tool
        (``calculateBMI``) — exercises the Python→Java tool bridge.
      - creative path: Java Ollama chat model with no tools — exercises
        the Python→Java chat-model resource bridge (``type: java`` on
        both the connection and the setup).

    chat_model_connections:
      - name: ollama_connection
        clazz: ollama
        request_timeout: 240.0
      - name: ollama_connection_java
        clazz: ollama
        type: java
        endpoint: http://localhost:11434
        requestTimeout: 240

    chat_model_setups:
      - name: math_chat_model
        clazz: ollama
        connection: ollama_connection
        model: qwen3:1.7b
        tools: [calculateBMI]
        extract_reasoning: true
      - name: creative_chat_model
        clazz: ollama
        type: java
        connection: ollama_connection_java
        model: qwen3:1.7b
        extract_reasoning: true

    tools:
      - name: calculateBMI
        type: java
        function: org.apache.flink.agents.resource.test.ChatModelCrossLanguageAgent:calculateBMI
        parameter_types: [java.lang.Double, java.lang.Double]

    actions:
      - name: process_input
        function: flink_agents.e2e_tests.e2e_tests_resource_cross_language.yaml_cross_language_actions:process_input
        trigger_conditions: [input]
      - name: process_chat_response
        function: flink_agents.e2e_tests.e2e_tests_resource_cross_language.yaml_cross_language_actions:process_chat_response
        trigger_conditions: [chat_response]