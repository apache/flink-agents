agents:
  - name: a1
    actions:
      - shared_inc
      - name: own_dec
        function: org.apache.flink.agents.api.yaml.LoaderTargets:decrement
        type: java
        trigger_conditions: [chat_response]
  - name: a2
    actions:
      - shared_inc

chat_model_connections:
  - name: shared_conn
    clazz: ollama
    type: java
    base_url: http://example

actions:
  - name: shared_inc
    function: org.apache.flink.agents.api.yaml.LoaderTargets:increment
    type: java
    trigger_conditions: [input]
